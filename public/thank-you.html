<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted - Reach Healthcare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { background: white; padding: 60px 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; text-align: center; }
        .checkmark { width: 80px; height: 80px; border-radius: 50%; background: #10b981; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; }
        .checkmark svg { width: 50px; height: 50px; stroke: white; stroke-width: 3; fill: none; }
        h1 { color: #1f2937; font-size: 28px; margin-bottom: 16px; }
        p { color: #6b7280; font-size: 16px; line-height: 1.6; margin-bottom: 30px; }
        .btn { display: inline-block; background: #2563eb; color: white; padding: 12px 32px; border-radius: 8px; text-decoration: none; font-weight: 500; transition: background 0.2s; }
        .btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">
            <svg viewBox="0 0 52 52"><path d="M14 27l7 7 16-16"/></svg>
        </div>
        <h1>Application Submitted!</h1>
        <p>Thank you for your application. We have received your information and will review it shortly. You should receive a confirmation email soon.</p>
        <a href="/" class="btn">Return to Home</a>
    </div>
</body>
</html>
